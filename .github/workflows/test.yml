name: Test

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ${{ matrix.os }}
    defaults:
      run:
        working-directory: ./desktop-app

    strategy:
      matrix:
        os: [macos-latest-large]
      fail-fast: false

    steps:
      - name: Check out Git repository
        uses: actions/checkout@v4

      - name: Install Node.js and NPM
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: ${{ !env.ACT && 'yarn' || '' }} # Disable cache for nektos/act
          cache-dependency-path: ./desktop-app/yarn.lock

      - name: yarn install
        run: |
          yarn install --network-timeout 120000

      - name: Build
        run: yarn run build

      - name: Lint, typecheck and unit test
        run: |
          yarn run lint
          yarn exec tsc
          yarn test

      - name: Verify Electron installation
        if: always()
        run: |
          echo "=== path.txt ==="
          cat node_modules/electron/path.txt 2>&1 || echo "MISSING"
          echo "=== dist/version ==="
          cat node_modules/electron/dist/version 2>&1 || echo "MISSING"
          echo "=== Binary file ==="
          file node_modules/electron/dist/Electron.app/Contents/MacOS/Electron 2>&1 || echo "MISSING"
          echo "=== dist/ contents ==="
          ls -la node_modules/electron/dist/ 2>&1 || echo "EMPTY"
          echo "=== node -e require('electron') ==="
          node -e "console.log(require('electron'))" 2>&1 || echo "FAILED"

      - name: E2E Tests
        run: yarn test:e2e
        env:
          CI: true
          E2E_TEST: true
          E2E_HEADLESS: true

      - name: Upload E2E Report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: playwright-report
          path: desktop-app/e2e/playwright-report/
          retention-days: 14

      - name: Package
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: yarn run package
